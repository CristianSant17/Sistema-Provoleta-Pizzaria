<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Pizzaria Provoleta - Sistema de Gestão Delivery">
  <title>Pizzaria Provoleta — Gestão Delivery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
  <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
  <link rel="alternate icon" href="assets/favicon.ico" type="image/x-icon">
</head>
<body>
  <div class="auth-overlay" id="authOverlay">
    <div class="auth-card" id="authCard">
      <div class="auth-card__icon"><i class="fa-solid fa-lock"></i></div>
      <h2>Acesso restrito</h2>
      <p>Digite a senha de acesso para entrar no painel administrativo.</p>
      <form id="authForm" class="auth-form">
        <label class="form-label" for="accessPassword">Digite a Senha de Acesso</label>
        <div class="auth-password">
          <input class="form-input auth-password__input" id="accessPassword" name="password" type="password" autocomplete="current-password" placeholder="Senha mestre" required>
          <button type="button" class="auth-password__toggle" id="togglePassword" aria-label="Mostrar senha" aria-pressed="false">
            <i class="fa-solid fa-eye"></i>
          </button>
        </div>
        <button type="submit" class="btn btn--primary">Entrar</button>
      </form>
      <p class="auth-hint">Senha padrão: JCProvoleta</p>
    </div>
  </div>

  <div id="app" class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__brand">
        <div class="sidebar__logo" id="logoContainer">
          <img src="assets/logo.png" alt="Pizzaria Provoleta" class="sidebar__logo-img" id="logoImg"
               onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='flex';">
          <div class="sidebar__logo-fallback" id="logoFallback" style="display:none;">
            <span class="sidebar__logo-icon">🍕</span>
            <div class="sidebar__logo-text">
              <strong>Pizzaria Provoleta</strong>
              <small>Gestão Delivery</small>
            </div>
          </div>
        </div>
      </div>

      <nav class="sidebar__nav" id="mainNav">
        <button class="nav-item active" data-page="pedidos">
          <span class="nav-item__icon"><i class="fa-solid fa-pizza-slice"></i></span>
          <span class="nav-item__label">Pedidos</span>
        </button>
        <button class="nav-item" data-page="configuracoes">
          <span class="nav-item__icon"><i class="fa-solid fa-sliders"></i></span>
          <span class="nav-item__label">Cadastros</span>
        </button>
        <button class="nav-item" data-page="caixa">
          <span class="nav-item__icon"><i class="fa-solid fa-sack-dollar"></i></span>
          <span class="nav-item__label">Fluxo de Caixa</span>
        </button>
        <button class="nav-item" data-page="motoboys">
          <span class="nav-item__icon"><i class="fa-solid fa-motorcycle"></i></span>
          <span class="nav-item__label">Acerto Motoboys</span>
        </button>
        <button class="nav-item" data-page="estoque">
          <span class="nav-item__icon"><i class="fa-solid fa-box-open"></i></span>
          <span class="nav-item__label">Estoque</span>
        </button>
        <button class="nav-item" data-page="dashboard">
          <span class="nav-item__icon"><i class="fa-solid fa-chart-line"></i></span>
          <span class="nav-item__label">Dashboards</span>
        </button>
        <button class="nav-item" data-page="backup">
          <span class="nav-item__icon"><i class="fa-solid fa-cloud-arrow-up"></i></span>
          <span class="nav-item__label">Backup / Publicar</span>
        </button>
      </nav>

      <div class="sidebar__footer">
        <a href="pedido.html" target="_blank" rel="noopener" class="sidebar__client-link"><i class="fa-solid fa-arrow-up-right-from-square"></i> Página do cliente</a>
        <button type="button" class="sidebar__logout" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
        <small>v1.2 · LocalStorage + JSON</small>
      </div>
    </aside>

    <!-- Overlay mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main content -->
    <div class="main-wrapper">
      <header class="topbar">
        <button class="topbar__menu-btn" id="menuToggle" aria-label="Abrir menu">☰</button>

        <div class="topbar__month">
          <label for="monthSelector" class="topbar__month-label">Mês de Referência</label>
          <input type="month" id="monthSelector" class="topbar__month-input">
        </div>

        <div class="topbar__actions">
          <span class="topbar__date" id="currentDateTime"></span>
        </div>
      </header>

      <main class="main-content" id="mainContent">
        <!-- Pages injected by JS -->
      </main>
    </div>
  </div>

  <!-- Modal container -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal__header">
        <h3 class="modal__title" id="modalTitle"></h3>
        <button class="modal__close" id="modalClose" aria-label="Fechar">×</button>
      </div>
      <div class="modal__body" id="modalBody"></div>
      <div class="modal__footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
